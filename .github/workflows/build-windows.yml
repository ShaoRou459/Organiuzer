name: Build Windows Executables

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows (AMD64 & ARM64)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Vite Build
        run: npm run build

      - name: Build Electron App
        # This will build standard installers (nsis) and portable executables 
        # for both x64 (AMD64) and arm64 architectures.
        run: npx electron-builder --win nsis portable --x64 --arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: organiuzer-windows-builds
          path: |
            release/*.exe
          retention-days: 7
